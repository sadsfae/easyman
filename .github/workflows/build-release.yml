name: Build Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        shell: bash
        run: |
          TAG="v0.1.$(git rev-list --count HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Easyman/Easyman.csproj

      - name: Publish
        run: >
          dotnet publish Easyman/Easyman.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:PublishSingleFile=true
          -o ./publish

      - name: Download middleman
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rm-you/p99-login-middlemand/releases/download/win-rel1/p99-login-middlemand.zip" `
            -OutFile middleman.zip
          Expand-Archive -Path middleman.zip -DestinationPath middleman-extract
          Copy-Item middleman-extract/p99-login-middlemand.exe ./publish/middleman.exe

      - name: Package release zip
        run: Compress-Archive -Path ./publish/Easyman.exe, ./publish/middleman.exe -DestinationPath ./Easyman-${{ steps.version.outputs.tag }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Easyman ${{ steps.version.outputs.tag }}
          files: ./Easyman-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
          make_latest: true
          body: |
            ## Quick Start

            - Download the `.zip` file below and extract it to any folder
            - Both `Easyman.exe` and `middleman.exe` must be in the same folder
            - Run `Easyman.exe`
            - Click **Browse** and locate your `eqhost.txt` in your EverQuest installation directory (one-time setup)
            - Click **Enable Middleman** to start the login proxy
            - Launch EverQuest and log in normally
            - **Keep Easyman open** while you play (you can minimize it)
            - When done, click **Disable Middleman** or close Easyman

            ## Windows SmartScreen

            On first run you may see "Windows protected your PC." This is normal for new applications:
            - Click **More info**
            - Click **Run anyway**

            ## Credits

            Powered by [p99-login-middlemand](https://github.com/rm-you/p99-login-middlemand) by [@rm-you](https://github.com/rm-you)

            ---

            ## Changelog
